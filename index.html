<!doctype html>
<meta name="google" content="notranslate">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>北京語学習 - 2026 Special Edition</title>
   <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('北京語PWA準備完了！', reg))
        .catch(err => console.log('PWA登録失敗', err));
    });
  }
</script>
   <style>
    :root {
      --bg-image: url('https://raw.githubusercontent.com/JSXAGI/mandarin-study/main/mandarin.jpg');
      --bg-color: #fef3c7;
      --surface-color: rgba(255, 255, 255, 0.95);
      --text-color: #000000;
      --primary-color: #d97706; 
      --secondary-color: #4f46e5;
      --header-height: 100px;
    }  
    * { box-sizing: border-box; font-family: 'Segoe UI', Meiryo, sans-serif; }
    body, html { 
      margin: 0; padding: 0; min-height: 100vh;
      background-color: var(--bg-color);
      background-image: var(--bg-image);
      background-size: cover;
      background-position: left 20% center !important;
      background-attachment: fixed;
      color: var(--text-color); 
    }

    /* ヘッダー：お爺さんこだわりの縁取り文字 */
    .app-header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); display: flex; align-items: center; z-index: 1000; }
    .home-link { position: absolute; left: 20px; background: #fff; color: #000; padding: 8px; border-radius: 12px; font-size: 2.2rem; border: 3px solid #000; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
    
    #mode-title {
      flex-grow: 1; text-align: center; color: #EF4123; 
      text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff, 0px 4px 10px rgba(0,0,0,0.5);
      font-weight: bold; font-size: 2rem;
    }

    .main-content { margin-top: calc(var(--header-height) + 10px); padding: 15px; max-width: 600px; margin-left: auto; margin-right: auto; }
    
    /* カードデザイン：視認性向上のため枠線を太く */
    .card { background: var(--surface-color); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 3px solid #000; margin-bottom: 20px; }
    
    /* 巨大ボタン */
    .btn { cursor: pointer; border: 3px solid #000; border-radius: 15px; padding: 15px; font-weight: bold; font-size: 1.3rem; width: 100%; margin-bottom: 12px; transition: 0.2s; }
    .btn-primary { background-color: var(--primary-color); color: white; }
    .btn-lvl { background: #fff; color: #000; font-size: 1.1rem; padding: 10px; }
    .btn-lvl.active { background: #000; color: #fff; transform: scale(1.05); }
    
    /* 言語表示：お目が不自由な方でも分かりやすく */
    .lang-row { background: #fff; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 2px solid #000; }
    .lang-label { font-size: 0.8rem; color: #444; font-weight: bold; margin-bottom: 4px; text-decoration: underline; }
    .lang-text { font-size: 1.8rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    
    /* スピーカーボタン：押しやすさ最大 */
    .btn-speak { background: #eee; border: 3px solid #000; padding: 15px; border-radius: 50%; cursor: pointer; font-size: 2rem; min-width: 70px; min-height: 70px; display: flex; align-items: center; justify-content: center; }
    .btn-speak:active { background: #aaa; }

    .hidden { display: none; }
    .text-center { text-align: center; }

    /* クエストエリア */
    #quest-area { border: 4px solid var(--secondary-color); background: #fff; }
   </style>
</head>
<body>
   <header class="app-header">
      <button class="home-link" onclick="showView('home')">🏠</button>
      <div id="mode-title">北京語学習</div>
   </header>

   <main class="main-content">
      <div id="home-view">
         <div class="card text-center">
            <h2 style="margin:0 0 10px 0; font-size: 1.2rem;">1. レベル選択</h2>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
               <button class="btn btn-lvl active" id="lvl-Beginner" onclick="setLevel('Beginner')">初級</button>
               <button class="btn btn-lvl" id="lvl-Intermediate" onclick="setLevel('Intermediate')">中級</button>
               <button class="btn btn-lvl" id="lvl-Advanced" onclick="setLevel('Advanced')">上級</button>
            </div>
         </div>
         <div class="card">
            <h2 class="text-center" style="margin:0 0 15px 0; font-size: 1.2rem;">2. 学習メニュー</h2>
            <button class="btn btn-primary" onclick="showView('vocabulary')">📚 単語カード</button>
            <button class="btn" style="background-color: var(--secondary-color); color:white;" onclick="showView('grammar')">✏️ 文法解説</button>
         </div>
         <div id="quest-area" class="card text-center">
            <h3 style="margin:0; color:var(--secondary-color);">🎧 Listening Quest</h3>
            <div id="q-box" style="margin: 15px 0; font-size: 1.2rem; min-height: 50px;"></div>
            <div id="a-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            <button id="q-start" class="btn btn-primary" style="background:#059669; margin-top:15px;" onclick="startQuest()">クエスト開始</button>
         </div>
      </div>

      <div id="vocabulary-view" class="hidden">
         <div class="card text-center">
            <div id="v-emoji" style="font-size: 6rem; margin-bottom:10px;"></div>
            <div class="lang-row">
               <div class="lang-label">北京語</div>
               <div class="lang-text"><span id="v-zh"></span><button class="btn-speak" onclick="speak('v-zh','zh-CN')">🔊</button></div>
            </div>
            <div class="lang-row">
               <div class="lang-label">English</div>
               <div class="lang-text"><span id="v-en" style="font-size: 1.4rem;"></span><button class="btn-speak" onclick="speak('v-en','en-US')">🔊</button></div>
            </div>
            <div class="lang-row">
               <div class="lang-label">日本語</div>
               <div class="lang-text"><span id="v-ja" style="font-size: 1.6rem;"></span><button class="btn-speak" onclick="speak('v-ja','ja-JP')">🔊</button></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
               <button class="btn" style="background: #e2e8f0;" onclick="changeVocab(-1)">◀ 前へ</button>
<button class="btn" style="background: #fef3c7;" onclick="shuffleWords()">🔀 SHUFFLE</button>
<button class="btn btn-primary" onclick="changeVocab(1)">次へ ▶</button>
            </div>
         </div>
      </div>

      <div id="grammar-view" class="hidden">
         <div id="grammar-list"></div>
         <button class="btn btn-primary" style="background:#475569;" onclick="showView('home')">メニューに戻る</button>
      </div>
   </main>

  { id: "GRAM-053", title: "直前の完了", sw_phrase: "我刚吃完。 wǒ gāng chī wán.", en_phrase: "I have just eaten.", ja_trans: "たった今食べ終わりました。", ja_explanation: "「刚」は直前の出来事を表します。", level: "Intermediate" },

  { id: "GRAM-055", title: "代替", sw_phrase: "喝水，不要喝汽水。 hē shuǐ, búyào hē qìshuǐ.", en_phrase: "Drink water instead of soda.", ja_trans: "ソーダではなく水を飲みなさい。", ja_explanation: "否定命令で代替行動を示します。", level: "Intermediate" },
  { id: "GRAM-056", title: "〜の前に", sw_phrase: "吃饭前要洗手。 chīfàn qián yào xǐ shǒu.", en_phrase: "Wash your hands before eating.", ja_trans: "食事の前に手を洗いなさい。", ja_explanation: "「前」は時間的な前後関係を表します。", level: "Intermediate" },
  { id: "GRAM-057", title: "〜の後に", sw_phrase: "下班后我回家。 xiàbān hòu wǒ huí jiā.", en_phrase: "After work, I go home.", ja_trans: "仕事の後、家に帰ります。", ja_explanation: "「后」は後の動作を示します。", level: "Intermediate" },
  { id: "GRAM-058", title: "一緒に", sw_phrase: "和我一起来吧。 hé wǒ yìqǐ lái ba.", en_phrase: "Come with me.", ja_trans: "私と一緒に来てください。", ja_explanation: "「和…一起」は同行を表します。", level: "Intermediate" },
  { id: "GRAM-059", title: "なしで", sw_phrase: "不加糖的茶。 bù jiā táng de chá.", en_phrase: "Tea without sugar.", ja_trans: "砂糖なしのお茶。", ja_explanation: "「不＋動詞」で否定修飾します。", level: "Intermediate" },
  { id: "GRAM-060", title: "習慣", sw_phrase: "他每天都读书。 tā měitiān dōu dúshū.", en_phrase: "He reads every day.", ja_trans: "彼は毎日読書します。", ja_explanation: "「都」は頻度や習慣を強調します。", level: "Intermediate" },
  { id: "GRAM-061", title: "話題", sw_phrase: "我们在谈论旅行。 wǒmen zài tánlùn lǚxíng.", en_phrase: "We are talking about travel.", ja_trans: "私たちは旅行について話しています。", ja_explanation: "「谈论」は話題を示す動詞です。", level: "Intermediate" },
  { id: "GRAM-062", title: "〜のために", sw_phrase: "这是给你的。 zhè shì gěi nǐ de.", en_phrase: "This is for you.", ja_trans: "これはあなたのためです。", ja_explanation: "「给」は対象を示します。", level: "Intermediate" },
  { id: "GRAM-063", title: "人の修飾", sw_phrase: "正在读书的人。 zhèngzài dúshū de rén.", en_phrase: "The person who is reading.", ja_trans: "本を読んでいる人。", ja_explanation: "「的」で人を修飾します。", level: "Intermediate" },
  { id: "GRAM-064", title: "物の修飾", sw_phrase: "我喜欢的东西。 wǒ xǐhuān de dōngxi.", en_phrase: "The thing that I like.", ja_trans: "私が好きな物。", ja_explanation: "動詞＋的＋名詞の形です。", level: "Intermediate" },
  { id: "GRAM-065", title: "場所の修飾", sw_phrase: "我住的地方。 wǒ zhù de dìfang.", en_phrase: "The place where I live.", ja_trans: "私が住んでいる場所。", ja_explanation: "場所も「的」で修飾します。", level: "Intermediate" },
  { id: "GRAM-066", title: "推量", sw_phrase: "也许我明天会来。 yěxǔ wǒ míngtiān huì lái.", en_phrase: "Maybe I will come tomorrow.", ja_trans: "たぶん明日来ます。", ja_explanation: "「也许」は不確かな推測です。", level: "Intermediate" },
  { id: "GRAM-067", title: "確信", sw_phrase: "当然！ dāngrán!", en_phrase: "Of course!", ja_trans: "もちろんです！", ja_explanation: "強い肯定や同意を表します。", level: "Intermediate" },
  { id: "GRAM-068", title: "同一", sw_phrase: "这个和那个一样。 zhège hé nàge yíyàng.", en_phrase: "This is the same as that.", ja_trans: "これはあれと同じです。", ja_explanation: "「一样」は同一性を示します。", level: "Intermediate" },
  { id: "GRAM-069", title: "相違", sw_phrase: "这完全不一样。 zhè wánquán bù yíyàng.", en_phrase: "This is completely different.", ja_trans: "これは全く違います。", ja_explanation: "副詞「完全」で強調します。", level: "Intermediate" },
  { id: "GRAM-070", title: "義務", sw_phrase: "我现在必须走了。 wǒ xiànzài bìxū zǒu le.", en_phrase: "I must go now.", ja_trans: "今行かなければなりません。", ja_explanation: "「必须」は強い義務を表します。", level: "Intermediate" },

  /* 上級 (Advanced) */
  { id: "GRAM-071", title: "推測の表現", sw_phrase: "好像要下雨了。 hǎoxiàng yào xiàyǔ le.", en_phrase: "It seems it will rain.", ja_trans: "雨が降りそうです。", ja_explanation: "「好像」は話し手の推測を表します。", level: "Advanced" },
  { id: "GRAM-072", title: "仮定と後悔", sw_phrase: "要是我早知道就好了。 yàoshi wǒ zǎo zhīdào jiù hǎo le.", en_phrase: "If I had known earlier...", ja_trans: "早く知っていればよかったのに。", ja_explanation: "「要是…就好」は後悔を含む仮定表現です。", level: "Advanced" },
  { id: "GRAM-073", title: "気づきの表現", sw_phrase: "原来如此！ yuánlái rúcǐ!", en_phrase: "I see!", ja_trans: "なるほど！", ja_explanation: "新しい事実への気づきを示します。", level: "Advanced" },
  { id: "GRAM-074", title: "ことわざ", sw_phrase: "慢工出细活。 màn gōng chū xì huó.", en_phrase: "Haste makes waste.", ja_trans: "急がば回れ。", ja_explanation: "中国語の代表的なことわざです。", level: "Advanced" },
  { id: "GRAM-075", title: "教訓表現", sw_phrase: "耐心带来成功。 nàixīn dàilái chénggōng.", en_phrase: "Patience brings success.", ja_trans: "忍耐は成功をもたらす。", ja_explanation: "抽象的な教訓を表します。", level: "Advanced" },
  { id: "GRAM-076", title: "比喩の表現", sw_phrase: "他就像我的哥哥一样。 tā jiù xiàng wǒ de gēge yíyàng.", en_phrase: "He is like my brother.", ja_trans: "彼は私の兄のようです。", ja_explanation: "「像…一样」は比喩表現です。", level: "Advanced" },
];

let currentLevel = 'Beginner';
let vIdx = 0;

function setLevel(lvl) {
    currentLevel = lvl;
    vIdx = 0; // レベルを変えたらインデックスをリセット
    document.querySelectorAll('.btn-lvl').forEach(b => b.classList.remove('active'));
    const targetBtn = document.getElementById('lvl-' + lvl);
    if(targetBtn) targetBtn.classList.add('active');
}

function showView(id) {
    document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden'));
    const targetView = document.getElementById(id + '-view');
    if(targetView) targetView.classList.remove('hidden');
    
    if(id === 'vocabulary') { 
        vIdx = 0; 
        updateVocab(); 
    }
    if(id === 'grammar') updateGrammar();
    window.scrollTo(0,0);
}

function updateVocab() {
    const list = vocabularyData.filter(d => d.level === currentLevel);
    if(!list.length) return;
    
    // 安全策：範囲外アクセス防止
    if (vIdx >= list.length) vIdx = 0;
    if (vIdx < 0) vIdx = list.length - 1;

    const d = list[vIdx];
    document.getElementById('v-emoji').innerText = d.emoji || '💡';
    document.getElementById('v-zh').innerText = d.zh;
    document.getElementById('v-en').innerText = d.en;
    document.getElementById('v-ja').innerText = d.ja;
}

function changeVocab(dir) {
    const list = vocabularyData.filter(d => d.level === currentLevel);
    if(!list.length) return;
    vIdx = (vIdx + dir + list.length) % list.length;
    updateVocab();
}

function shuffleWords() {
    // 元の配列自体をシャッフル（Fisher-Yates法）
    for (let i = vocabularyData.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [vocabularyData[i], vocabularyData[j]] = [vocabularyData[j], vocabularyData[i]];
    }
    vIdx = 0; // 混ぜた後は最初の単語を表示
    updateVocab(); 
    alert("🔀 全てのレベルの単語を混ぜ合わせました！");
}

function updateGrammar() {
    const area = document.getElementById('grammar-list');
    if(!area) return;
    area.innerHTML = "";
    const list = grammarData.filter(d => d.level === currentLevel);
    list.forEach((g, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div style="font-size:1.1rem; font-weight:bold; color:var(--secondary-color); margin-bottom:15px;">${g.title}</div>
            <div class="lang-row">
                <div class="lang-label">北京語</div>
                <div class="lang-text"><span id="g-zh-${i}">${g.sw_phrase.split(' ')[0]}</span><button class="btn-speak" onclick="speak('g-zh-${i}','zh-CN')">🔊</button></div>
            </div>
            <div class="lang-row">
                <div class="lang-label">English</div>
                <div class="lang-text"><span id="g-en-${i}" style="font-size:1.3rem;">${g.en_phrase}</span><button class="btn-speak" onclick="speak('g-en-${i}','en-US')">🔊</button></div>
            </div>
            <div class="lang-row">
                <div class="lang-label">日本語</div>
                <div class="lang-text"><span id="g-ja-${i}" style="font-size:1.4rem;">${g.ja_trans}</span><button class="btn-speak" onclick="speak('g-ja-${i}','ja-JP')">🔊</button></div>
            </div>
            <div style="background:#f1f5f9; padding:12px; border-radius:10px; font-size:1rem; border-left:5px solid var(--secondary-color);">
                <strong>解説:</strong> ${g.ja_explanation}
            </div>
        `;
        area.appendChild(card);
    });
}

function speak(id, lang) {
    window.speechSynthesis.cancel();
    const el = document.getElementById(id);
    if(!el) return;
    const text = el.innerText;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.8;
    window.speechSynthesis.speak(u);
}

let qTarget = null;
function startQuest() {
    const list = vocabularyData.filter(d => d.level === currentLevel);
    if(list.length < 4) {
        alert("クイズには少なくとも4つの単語が必要です。");
        return;
    }
    
    qTarget = list[Math.floor(Math.random() * list.length)];
    document.getElementById('q-box').innerHTML = `<button class="btn-speak" onclick="speakQ()" style="width:100px; height:100px; font-size:3rem !important;">🔊</button>`;
    
    let choices = [qTarget];
    while(choices.length < 4) {
        let r = list[Math.floor(Math.random() * list.length)];
        if(!choices.includes(r)) choices.push(r);
    }
    choices.sort(() => Math.random() - 0.5);

    const area = document.getElementById('a-grid');
    area.innerHTML = "";
    choices.forEach(c => {
        const b = document.createElement('button');
        b.className = 'btn btn-lvl';
        b.style.minHeight = '70px';
        b.innerText = c.ja;
        b.onclick = () => {
            // idを使わず、北京語の文字列が一致するかで判定（確実）
            if(c.zh === qTarget.zh) { 
                alert("正解です！🌟"); 
                startQuest(); 
            } else {
                alert("残念、違います。");
            }
        };
        area.appendChild(b);
    });
    speakQ();
}

function speakQ() {
    if(!qTarget) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(qTarget.zh);
    u.lang = 'zh-CN';
    u.rate = 0.7;
    window.speechSynthesis.speak(u);
}
</script>
